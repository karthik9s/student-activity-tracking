# Application Configuration
spring.application.name=student-activity-tracker
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://karthik:karthik@cluster0.wzxks5z.mongodb.net/student_tracker
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-use-environment-variable
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Logging Configuration
logging.level.root=INFO
logging.level.com.college.activitytracker=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# Security Configuration
security.rate-limit.requests-per-minute=100
security.brute-force.max-attempts=5
security.brute-force.lockout-duration-minutes=15
